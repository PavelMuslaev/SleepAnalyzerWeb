{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h2 class="mb-4">Загрузка данных сна</h2>
        <p>Загрузите CSV-файл с данными сна. Ожидаемые колонки: <code>date, sleep_start, sleep_end, deep_sleep_minutes, light_sleep_minutes, rem_minutes, awakenings</code>.</p>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" enctype="multipart/form-data" class="card p-4 shadow">
            <div class="mb-3">
                <label for="csvfile" class="form-label">Выберите файл .csv</label>
                <input class="form-control" type="file" id="csvfile" name="csvfile" accept=".csv" required>
            </div>
            <button type="submit" class="btn btn-primary">Загрузить и анализировать</button>
        </form>
    </div>
</div>
{% endblock %}
